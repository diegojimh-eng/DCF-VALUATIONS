version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
# ValuPro — Local Development Stack
# Usage: docker compose up --build
# All services hot-reload on code changes.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     valupro
      POSTGRES_PASSWORD: valupro
      POSTGRES_DB:       valupro
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U valupro"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  10

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV:      development
      DATABASE_URL: postgresql+asyncpg://valupro:valupro@postgres:5432/valupro
      REDIS_URL:    redis://redis:6379/0
      # Add your API keys here or copy backend/.env.example to backend/.env
      FMP_API_KEY:              ${FMP_API_KEY:-demo}
      ALPHA_VANTAGE_API_KEY:    ${ALPHA_VANTAGE_API_KEY:-demo}
      ANTHROPIC_API_KEY:        ${ANTHROPIC_API_KEY:-demo}
      API_SECRET_KEY:           ${API_SECRET_KEY:-dev-secret-change-in-production}
      CORS_ALLOWED_ORIGINS:     http://localhost:3000
      LOG_LEVEL:                INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./backend:/app
      - backend_cache:/app/__pycache__
    command:
      - uvicorn
      - main:app
      - --host=0.0.0.0
      - --port=8000
      - --reload
      - --log-level=info
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 15s

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL:     http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV:                development
    ports:
      - "3000:3000"
    depends_on:
      backend: { condition: service_healthy }
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
      - frontend_next:/app/.next
    command: sh -c "npm install --prefer-offline && npm run dev"

volumes:
  postgres_data:
  backend_cache:
  frontend_modules:
  frontend_next:
